<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>직방·호갱노노 토탈 메시징 솔루션</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.3.0/dist/tabler-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0ede6;--panel:#ffffff;--panel2:#f7f5f0;--panel3:#edeae3;
  --border:rgba(0,0,0,.08);--border2:rgba(0,0,0,.13);
  --txt:#111827;--txt2:#6b7280;--txt3:#9ca3af;
  --ac:#1D9E75;--ac2:#17855f;--ac-bg:rgba(29,158,117,.1);--ac-border:rgba(29,158,117,.25);
  --info-bg:#eff6ff;--info-txt:#1d4ed8;--info-border:rgba(59,130,246,.2);
  --warn-bg:#fffbeb;--warn-txt:#92400e;--warn-border:rgba(245,158,11,.2);
  --danger-bg:#fff5f5;--danger-txt:#b91c1c;--danger-border:rgba(239,68,68,.2);
  --ok-bg:#f0fdf4;--ok-txt:#166534;--ok-border:rgba(34,197,94,.2);
  --r:8px;--r2:12px;--shadow:0 2px 10px rgba(0,0,0,.07);
  --font:'Noto Sans KR',-apple-system,sans-serif;
}
[data-theme=dark]{
  --bg:#161616;--panel:#1e1e1e;--panel2:#252525;--panel3:#2c2c2c;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --txt:#f3f4f6;--txt2:#9ca3af;--txt3:#6b7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:13px;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{height:44px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0;z-index:10}
.logo{font-size:13px;font-weight:700;color:var(--ac);letter-spacing:-.3px}
.logo span{color:var(--txt2);font-weight:400}
.topbar-r{margin-left:auto;display:flex;align-items:center;gap:7px}
.api-wrap{display:flex;align-items:center;gap:5px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--r);padding:3px 8px}
.api-wrap input{font-family:var(--font);font-size:11px;border:none;background:transparent;color:var(--txt2);width:210px;outline:none}
.api-wrap input::placeholder{color:var(--txt3)}
.theme-btn{width:28px;height:28px;border-radius:var(--r);border:1px solid var(--border);background:var(--panel2);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--txt2);font-size:14px}
.theme-btn:hover{background:var(--panel3)}

/* ── LAYOUT ── */
.wrap{display:flex;flex:1;overflow:hidden}
.sb{width:52px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0}
.sbn{width:38px;height:36px;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;cursor:pointer;color:var(--txt3);border:1px solid transparent;transition:all .15s;text-decoration:none}
.sbn:hover{color:var(--txt);background:var(--panel2)}
.sbn.on{color:var(--ac);background:var(--ac-bg);border-color:var(--ac-border)}
.sbn i{font-size:16px}
.sbn span{font-size:7.5px;font-weight:600;letter-spacing:.01em}
.sb-sep{width:22px;height:1px;background:var(--border);margin:3px 0;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.mhdr{height:42px;display:flex;align-items:center;padding:0 14px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0;background:var(--panel)}
.mhdr-t{font-size:13px;font-weight:600}
.mhdr-s{font-size:11px;color:var(--txt2)}
.mhdr-r{margin-left:auto;display:flex;gap:6px;align-items:center}
.mbody{flex:1;overflow-y:auto;padding:14px}
.mbody::-webkit-scrollbar{width:4px}.mbody::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ── COMPONENTS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--panel);color:var(--txt);font-size:12px;font-family:var(--font);cursor:pointer;transition:all .12s}
.btn:hover{background:var(--panel2)}
.btn-p{background:var(--ac);color:#fff;border-color:transparent}
.btn-p:hover{background:var(--ac2)}
.btn-sm{padding:4px 9px;font-size:11px}
.card{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:13px;margin-bottom:9px}
.card-t{font-size:12px;font-weight:600;margin-bottom:10px;color:var(--txt2)}
.sec{font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:9px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.stat{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px}
.stat-l{font-size:11px;color:var(--txt2);margin-bottom:4px}
.stat-v{font-size:20px;font-weight:700;letter-spacing:-.5px}
.stat-d{font-size:11px;margin-top:3px}
.stat-d.up{color:var(--ac)}
.stat-d.dn{color:var(--danger-txt)}
.stat-d.nu{color:var(--txt3)}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);background:var(--panel2);font-size:11px;color:var(--txt2);cursor:pointer;transition:all .12s;user-select:none;white-space:nowrap}
.chip:hover{border-color:var(--ac);color:var(--ac)}
.chip.on{background:var(--ac-bg);color:var(--ac);border-color:var(--ac-border);font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.inp{width:100%;padding:7px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--panel);font-family:var(--font);font-size:12px;color:var(--txt);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--ac)}
.inp::placeholder{color:var(--txt3)}
.lbl{font-size:11px;font-weight:500;color:var(--txt2);margin-bottom:5px;display:block}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500}
.badge-ok{background:var(--ok-bg);color:var(--ok-txt);border:1px solid var(--ok-border)}
.badge-warn{background:var(--warn-bg);color:var(--warn-txt);border:1px solid var(--warn-border)}
.badge-info{background:var(--info-bg);color:var(--info-txt);border:1px solid var(--info-border)}
.divider{height:1px;background:var(--border);margin:10px 0}
.tip{font-size:11px;color:var(--txt3);line-height:1.5}
.row{display:flex;align-items:center;gap:8px}
.frow{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.tab-bar{display:flex;gap:1px;background:var(--panel2);border-radius:var(--r);padding:3px;margin-bottom:10px;border:1px solid var(--border)}
.tab-btn{flex:1;padding:4px 8px;border-radius:6px;border:none;background:transparent;font-family:var(--font);font-size:11px;font-weight:500;color:var(--txt2);cursor:pointer;transition:all .12s}
.tab-btn.on{background:var(--panel);color:var(--txt);box-shadow:0 1px 3px rgba(0,0,0,.08)}
select.inp{cursor:pointer}
textarea.inp{resize:vertical;min-height:58px;line-height:1.5}

/* ── CAMPAIGN CARD ── */
.cc{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px;cursor:pointer;transition:all .12s}
.cc:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.cc-n{font-size:12px;font-weight:500;margin-bottom:3px}
.cc-m{display:flex;gap:8px;font-size:11px;color:var(--txt2)}
.cc-s{display:flex;align-items:center;gap:10px}
.cc-st{font-size:14px;font-weight:700;color:var(--ac);text-align:right}
.cc-sl{font-size:10px;color:var(--txt3)}

/* ── BUILDER STEPPER ── */
.steps{display:flex;gap:0;margin-bottom:14px}
.step{flex:1;display:flex;align-items:center}
.step-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--txt3);flex-shrink:0;transition:all .2s}
.step.done .step-dot{background:var(--ac);border-color:var(--ac);color:#fff}
.step.cur .step-dot{border-color:var(--ac);color:var(--ac)}
.step-lbl{font-size:10px;color:var(--txt3);margin-left:6px;white-space:nowrap}
.step.done .step-lbl,.step.cur .step-lbl{color:var(--txt2);font-weight:500}
.step-line{flex:1;height:1px;background:var(--border);margin:0 6px}
.step.done .step-line{background:var(--ac)}

/* ── CHANNEL CARD ── */
.ch-card{border:1px solid var(--border);border-radius:var(--r2);padding:12px;cursor:pointer;transition:all .15s;background:var(--panel)}
.ch-card:hover{border-color:var(--border2)}
.ch-card.on{border-color:var(--ac);background:var(--ac-bg)}
.ch-card-ico{width:32px;height:32px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;font-size:16px;margin-bottom:7px}
.ch-card-t{font-size:12px;font-weight:600;margin-bottom:3px}
.ch-card-d{font-size:10px;color:var(--txt2)}

/* ── MSG PREVIEW ── */
.preview{background:#1c1c1e;border-radius:16px;padding:12px 14px;color:#fff}
.preview-bar{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.preview-ico{width:20px;height:20px;border-radius:5px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:10px}
.preview-app{font-size:10px;font-weight:600}
.preview-time{font-size:10px;color:rgba(255,255,255,.4);margin-left:auto}
.preview-title{font-size:12px;font-weight:600;margin-bottom:2px}
.preview-body{font-size:11px;color:rgba(255,255,255,.7);line-height:1.5}

/* ── JOURNEY FLOW ── */
.jflow{display:flex;flex-direction:column;gap:0}
.jnode{background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;font-size:12px}
.jnode-t{font-weight:600;margin-bottom:2px}
.jnode-d{font-size:10px;color:var(--txt2)}
.jarrow{display:flex;align-items:center;justify-content:center;height:22px;color:var(--txt3);font-size:16px}
.jnode.trigger{border-color:var(--info-border);background:var(--info-bg)}
.jnode.action{border-color:var(--ac-border);background:var(--ac-bg)}
.jnode.cond{border-color:var(--warn-border);background:var(--warn-bg)}

/* ── AGENT ── */
.agent-wrap{display:flex;flex-direction:column;height:100%;min-height:520px}
.agent-msgs{flex:1;overflow-y:auto;padding:4px 0 10px;display:flex;flex-direction:column;gap:8px;min-height:0}
.agent-msgs::-webkit-scrollbar{width:3px}.agent-msgs::-webkit-scrollbar-thumb{background:var(--border2)}
.amsg{max-width:88%;padding:9px 12px;border-radius:12px;font-size:12px;line-height:1.6;white-space:pre-wrap}
.amsg.user{align-self:flex-end;background:var(--ac);color:#fff;border-radius:12px 12px 3px 12px}
.amsg.agent{align-self:flex-start;background:var(--panel2);border:1px solid var(--border);border-radius:3px 12px 12px 12px}
.amsg.err{border-color:var(--danger-border);background:var(--danger-bg);color:var(--danger-txt)}
.amsg.tool{align-self:flex-start;background:var(--info-bg);border:1px solid var(--info-border);border-radius:var(--r);font-size:11px;color:var(--info-txt);font-family:monospace;max-width:94%}
.agent-sug{display:flex;flex-wrap:wrap;gap:5px;padding:8px 0 10px}
.agent-sug-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--panel2);color:var(--txt2);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .12s;text-align:left;line-height:1.4}
.agent-sug-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--ac-bg)}
.agent-inp{display:flex;gap:6px;align-items:flex-end;padding-top:6px;border-top:1px solid var(--border)}
.agent-inp textarea{flex:1;font-family:var(--font);font-size:12px;padding:8px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--panel);color:var(--txt);resize:none;height:36px;max-height:68px;outline:none;line-height:1.5;transition:border-color .15s}
.agent-inp textarea:focus{border-color:var(--ac)}
.agent-inp button{width:34px;height:34px;border-radius:var(--r);border:none;background:var(--ac);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:opacity .15s}
.agent-inp button:disabled{opacity:.4}
.typing{display:flex;gap:3px;align-items:center;padding:9px 12px}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--txt3);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,60%,100%{opacity:.3}30%{opacity:1}}

/* ── DEEPLINK INPUT ── */
.dl-wrap{display:flex;gap:5px;align-items:center}
.dl-wrap .inp{flex:1}
.dl-badge{font-size:10px;padding:3px 7px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--r);color:var(--txt2);white-space:nowrap;cursor:default}

/* ── SEGMENT LIST ── */
.seg-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px}
.seg-name{font-size:12px;font-weight:500}
.seg-cnt{font-size:11px;color:var(--txt2)}

/* ── ANALYTICS ── */
.perf-bar{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:11px}
.bar-track{flex:1;height:6px;border-radius:3px;background:var(--panel2);overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:var(--ac);transition:width .4s ease}

/* ── CROSS-CHANNEL RETARGET ── */
.retarget-flow{display:flex;flex-direction:column;gap:0;position:relative}
.rt-node{display:flex;gap:10px;align-items:flex-start;position:relative}
.rt-line{width:1px;background:var(--border2);height:24px;margin-left:19px;flex-shrink:0}
.rt-ch-dot{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid transparent}
.rt-body{flex:1;min-width:0}
.rt-label{font-size:11px;font-weight:600;margin-bottom:3px}
.rt-cond{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;margin-bottom:6px}
.rt-msg{background:var(--panel2);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;font-size:11px}
.rt-msg-t{font-weight:600;margin-bottom:2px}
.rt-msg-d{color:var(--txt2);line-height:1.5}
.rt-del{font-size:10px;color:var(--txt3);margin-top:4px}
.rt-toggle{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel2);border:1px solid var(--border);border-radius:var(--r);cursor:pointer;transition:all .15s;margin-bottom:10px}
.rt-toggle:hover{border-color:var(--border2)}
.rt-toggle.on{border-color:var(--ac-border);background:var(--ac-bg)}
.switch{width:32px;height:18px;border-radius:9px;background:var(--panel3);position:relative;transition:background .2s;flex-shrink:0}
.switch.on{background:var(--ac)}
.switch::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .2s}
.switch.on::after{transform:translateX(14px)}
.rt-step-card{background:var(--panel);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px;margin-bottom:8px;position:relative}
.rt-step-card .step-num{position:absolute;top:-10px;left:12px;background:var(--panel);padding:0 6px;font-size:10px;font-weight:700;color:var(--txt2)}
.rt-del-btn{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:var(--r);border:1px solid var(--border);background:var(--panel2);color:var(--txt3);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.rt-del-btn:hover{color:var(--danger-txt);border-color:var(--danger-border);background:var(--danger-bg)}
.ch-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1.5px solid}
.funnel-row{display:flex;align-items:center;gap:0;margin-bottom:12px}
.funnel-ch{flex:1;text-align:center;padding:10px 6px;background:var(--panel);border:1px solid var(--border);border-radius:var(--r2);position:relative}
.funnel-ch .funnel-label{font-size:10px;font-weight:600;margin-bottom:4px}
.funnel-ch .funnel-val{font-size:16px;font-weight:700}
.funnel-ch .funnel-sub{font-size:10px;color:var(--txt2)}
.funnel-arrow{width:32px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:12px;color:var(--txt3)}
.funnel-arrow .cond-lbl{font-size:9px;color:var(--danger-txt);font-weight:600;text-align:center;white-space:nowrap}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">직방 TMS <span>토탈 메시징 솔루션</span></div>
  <div class="topbar-r">
    <div class="api-wrap">
      <i class="ti ti-key" style="font-size:12px;color:var(--txt3)"></i>
      <input type="password" id="apiKeyInp" placeholder="Claude API Key (sk-ant-...)">
      <button class="btn btn-sm" onclick="saveKey()" style="padding:2px 7px;font-size:10px">저장</button>
    </div>
    <button class="theme-btn" onclick="toggleTheme()"><i class="ti ti-moon" id="themeIco"></i></button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="wrap">
  <!-- SIDEBAR -->
  <div class="sb">
    <a class="sbn on" id="sbn-dash" onclick="nav('dash',this)">
      <i class="ti ti-layout-dashboard"></i><span>대시보드</span>
    </a>
    <a class="sbn" id="sbn-builder" onclick="nav('builder',this)">
      <i class="ti ti-send"></i><span>빌더</span>
    </a>
    <a class="sbn" id="sbn-journey" onclick="nav('journey',this)">
      <i class="ti ti-route"></i><span>저니</span>
    </a>
    <div class="sb-sep"></div>
    <a class="sbn" id="sbn-audience" onclick="nav('audience',this)">
      <i class="ti ti-users"></i><span>오디언스</span>
    </a>
    <a class="sbn" id="sbn-analytics" onclick="nav('analytics',this)">
      <i class="ti ti-chart-bar"></i><span>성과</span>
    </a>
    <div class="sb-sep"></div>
    <a class="sbn" id="sbn-agent" onclick="nav('agent',this)">
      <i class="ti ti-robot"></i><span>AI</span>
    </a>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="mhdr">
      <span class="mhdr-t" id="mhdr-t">대시보드</span>
      <span class="mhdr-s" id="mhdr-s">직방 · 호갱노노 통합 메시징 콘솔</span>
      <div class="mhdr-r" id="mhdr-r">
        <button class="btn btn-p btn-sm" onclick="nav('builder',document.getElementById('sbn-builder'))"><i class="ti ti-plus" style="font-size:11px"></i>새 캠페인</button>
      </div>
    </div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  DEEPLINK MAP v3 — 173개 딥링크 기반 캠페인 유형별 추천 딥링크
// ═══════════════════════════════════════════════════════════════════════════
const DEEPLINK_MAP = {
  apt_map:          { link:'zigbang:///home/apt/map',                        desc:'아파트 지도 (재방문 유도 기본값)' },
  apt_danji:        { link:'zigbang:///home/apt/danjis/:area_danji_id',       desc:'아파트 단지 상세' },

function suggestDeeplinks(audience, message) {
  const combined = `${audience} ${message}`.toLowerCase();
  const scores = {};
  const rules = [
    {keys:['아파트','apt','단지'],         campaigns:['아파트_재방문','아파트_문의유도']},
    {keys:['찜','zzim','저장','관심'],      campaigns:['아파트_찜리마인더','원룸_재방문']},
    {keys:['분양','청약'],                  campaigns:['아파트_분양','청약_관심']},
    {keys:['원룸','원오빌','빌라','오피스텔'],campaigns:['원룸_재방문','원룸_문의유도']},
    {keys:['ai','zena','제나','중개사'],    campaigns:['AI중개사_유도']},
    {keys:['동향','리포트','뉴스'],          campaigns:['콘텐츠_유도']},
    {keys:['거주','인증'],                   campaigns:['거주민인증_유도']},
    {keys:['체크','사기','지킴'],            campaigns:['체크리스트_유도']},
    {keys:['인기','랭킹'],                   campaigns:['인기탐색']},
  ];
  rules.forEach(({keys,campaigns})=>{
    if(keys.some(k=>combined.includes(k))) campaigns.forEach(c=>{scores[c]=(scores[c]||0)+1;});
  });
  const top = Object.entries(scores).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([c])=>c);
  if(!top.length) top.push('아파트_재방문');
  const keys = [...new Set(top.flatMap(c=>CAMPAIGN_DEEPLINK_SUGGEST[c]||[]))].slice(0,3);
  return keys.map(k=>DEEPLINK_MAP[k]).filter(Boolean);
}

function nav(section, el) {
  activeSection = section;
  document.querySelectorAll('.sbn').forEach(s=>s.classList.remove('on'));
  if(el) el.classList.add('on');
  const T={dash:'대시보드',builder:'캠페인 빌더',journey:'저니 빌더',audience:'오디언스',analytics:'성과 분석',agent:'AI 에이전트'};
  const S={dash:'직방 · 호갱노노 통합 메시징 콘솔',builder:'채널 선택부터 발송까지 한 흐름으로',journey:'이벤트 기반 자동화 메시지 시퀀스',audience:'유저 세그먼트 관리',analytics:'캠페인 성과 추적',agent:'자연어로 모든 기능을 제어하세요'};
  document.getElementById('mhdr-t').textContent = T[section];
  document.getElementById('mhdr-s').textContent = S[section];
  const R = document.getElementById('mhdr-r');
  if(section==='dash') R.innerHTML=`<button class="btn btn-p btn-sm" onclick="nav('builder',document.getElementById('sbn-builder'))"><i class="ti ti-plus" style="font-size:11px"></i>새 캠페인</button>`;
  else if(section==='audience') R.innerHTML=`<button class="btn btn-p btn-sm" onclick="agentSug('새 세그먼트 만들어줘')"><i class="ti ti-sparkles" style="font-size:11px"></i>AI로 생성</button>`;
  else R.innerHTML = '';
  render();
}

function render() {
  const b = document.getElementById('mbody');
  if(activeSection==='dash')      b.innerHTML = renderDash();
  else if(activeSection==='builder') b.innerHTML = renderBuilder();
  else if(activeSection==='journey') b.innerHTML = renderJourney();
  else if(activeSection==='audience') b.innerHTML = renderAudience();
  else if(activeSection==='analytics') b.innerHTML = renderAnalytics();
  else if(activeSection==='agent') { b.innerHTML = renderAgent(); initAgentUI(); }
}

// ═══════════════════════════════════════════════════════════════════════════
function renderBuilder() {
  const steps = ['채널','오디언스','메시지','검토'];
  const stepHtml = steps.map((s,i)=>`
    <div class="step ${i<builderStep?'done':i===builderStep?'cur':''}">
      <div class="step-dot">${i<builderStep?'✓':(i+1)}</div>
      <span class="step-lbl">${s}</span>
      ${i<steps.length-1?'<div class="step-line"></div>':''}
    </div>`).join('');

  if(builderStep===0) return `
    ${stepHtml}
    <div class="sec">서비스 선택</div>
    <div class="tab-bar">
      <button class="tab-btn ${BD.service==='zigbang'?'on':''}" onclick="BD.service='zigbang';render()">직방</button>
      <button class="tab-btn ${BD.service==='hogangnono'?'on':''}" onclick="BD.service='hogangnono';render()">호갱노노</button>
    </div>
    <div class="sec">채널 선택</div>
    <div class="grid3">
      ${[
        {k:'push',  ico:'ti-device-mobile-vibration', t:'푸시 알림',   d:'iOS · Android 알림'},
        {k:'inapp', ico:'ti-app-window',               t:'인앱 메시지', d:'앱 내 팝업 · 배너'},
        {k:'kakao', ico:'ti-message-dots',             t:'카카오 알림톡',d:'카카오톡 비즈메시지'},
      ].map(c=>`
      <div class="ch-card ${BD.channel===c.k?'on':''}" onclick="BD.channel='${c.k}';render()">
        <div class="ch-card-ico" style="background:${BD.channel===c.k?'var(--ac)':'var(--panel2)'}"><i class="${c.ico}" style="color:${BD.channel===c.k?'#fff':'var(--txt2)'}"></i></div>
        <div class="ch-card-t">${c.t}</div>
        <div class="ch-card-d">${c.d}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;justify-content:flex-end;margin-top:4px">
      <button class="btn btn-p btn-sm" onclick="builderStep=1;render()">다음 <i class="ti ti-arrow-right" style="font-size:11px"></i></button>
    </div>`;

  if(builderStep===1) {
    const seg = SEGS.find(s=>s.id===BD.segId)||SEGS[0];
    return `
    ${stepHtml}
    <div class="sec">오디언스 선택</div>
    ${SEGS.map(s=>`
    <div class="seg-item" style="cursor:pointer;${BD.segId===s.id?'border-color:var(--ac);background:var(--ac-bg)':''}" onclick="BD.segId='${s.id}';render()">
      <div>
        <div class="seg-name">${s.name}</div>
        <div style="font-size:10px;color:var(--txt3);margin-top:2px">${s.filters}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700;color:var(--ac)">${s.cnt}</div>
        <div style="font-size:10px;color:var(--txt3)">명</div>
      </div>
    </div>`).join('')}
    <div style="display:flex;justify-content:space-between;margin-top:8px">
      <button class="btn btn-sm" onclick="builderStep=0;render()"><i class="ti ti-arrow-left" style="font-size:11px"></i> 이전</button>
      <button class="btn btn-p btn-sm" onclick="builderStep=2;render()">다음 <i class="ti ti-arrow-right" style="font-size:11px"></i></button>
    </div>`;
  }

  if(builderStep===2) {
    // 딥링크 자동 추천
    const suggested = suggestDeeplinks(SEGS.find(s=>s.id===BD.segId)?.name||'', BD.bodyA||'');
    const dl = suggested[0]?.link || 'zigbang:///home/apt/map';
    if(!BD.deeplinkA) BD.deeplinkA = dl;
    const dlDesc = Object.values(DEEPLINK_MAP).find(d=>d.link===BD.deeplinkA)?.desc || '';
    return `
    ${stepHtml}
    <div class="grid2">
      <div>
        <div class="sec">메시지 작성 ${BD.service==='zigbang'?'(직방)':'(호갱노노)'}</div>
        <div class="tab-bar">
          <button class="tab-btn on">메시지 A</button>
          <button class="tab-btn" onclick="BD.abTest=!BD.abTest;render()">+ A/B 테스트${BD.abTest?' ✓':''}</button>
        </div>
        <div class="frow"><label class="lbl">제목</label><input class="inp" placeholder="예: 관심 지역 신규 매물 등록!" value="${BD.titleA}" oninput="BD.titleA=this.value;updatePreview()"></div>
        <div class="frow"><label class="lbl">본문</label><textarea class="inp" placeholder="매물 내용을 간결하게..." oninput="BD.bodyA=this.value;updatePreview()">${BD.bodyA}</textarea></div>
        <div class="frow">
          <label class="lbl">딥링크 <span style="color:var(--txt3)">(클릭 시 이동 화면)</span></label>
          <div class="dl-wrap">
            <input class="inp" id="dlInpA" placeholder="zigbang:///home/apt/map" value="${BD.deeplinkA}" oninput="BD.deeplinkA=this.value">
            ${dlDesc?`<span class="dl-badge">${dlDesc}</span>`:''}
          </div>
          <div class="chips" style="margin-top:5px">
            ${suggested.map(d=>`<span class="chip" onclick="BD.deeplinkA='${d.link}';document.getElementById('dlInpA').value='${d.link}';render()" title="${d.desc}">${d.desc.split('(')[0].trim()}</span>`).join('')}
          </div>
        </div>
        <div class="frow"><label class="lbl">CTA 버튼</label><input class="inp" placeholder="지금 확인하기" value="${BD.ctaA}" oninput="BD.ctaA=this.value"></div>
        <button class="btn btn-sm" style="width:100%;justify-content:center;margin-top:4px" onclick="aiMsg('A')"><i class="ti ti-sparkles" style="font-size:11px;color:var(--ac)"></i>AI 메시지 추천</button>
      </div>
      <div>
        <div class="sec">미리보기</div>
        <div class="preview" id="msgPreview">
          <div class="preview-bar"><div class="preview-ico"><i class="ti ti-home" style="font-size:11px"></i></div><div class="preview-app">직방</div><div class="preview-time">지금</div></div>
          <div class="preview-title" id="prevTitle">${BD.titleA||'제목을 입력하세요'}</div>
          <div class="preview-body" id="prevBody">${BD.bodyA||'메시지 본문이 여기 표시됩니다'}</div>
        </div>
        <div class="sec" style="margin-top:12px">발송 트리거</div>
        <div class="frow">
          <select class="inp" onchange="BD.trigger=this.value">
            <option value="immediate" ${BD.trigger==='immediate'?'selected':''}>즉시 발송</option>
            <option value="schedule"  ${BD.trigger==='schedule' ?'selected':''}>예약 발송</option>
            <option value="event"     ${BD.trigger==='event'    ?'selected':''}>이벤트 기반</option>
          </select>
        </div>
        ${BD.trigger==='schedule'?`<div class="frow"><input type="datetime-local" class="inp"></div>`:''}
      </div>
    </div>
    </div>
    ${renderRetargetConfig()}
    <div style="display:flex;justify-content:space-between;margin-top:8px">
      <button class="btn btn-sm" onclick="builderStep=1;render()"><i class="ti ti-arrow-left" style="font-size:11px"></i> 이전</button>
      <button class="btn btn-p btn-sm" onclick="builderStep=3;render()">검토 <i class="ti ti-arrow-right" style="font-size:11px"></i></button>
    </div>`;
  }

  // STEP 3 — REVIEW
  const seg = SEGS.find(s=>s.id===BD.segId)||SEGS[0];
  const dlEntry = Object.values(DEEPLINK_MAP).find(d=>d.link===BD.deeplinkA);
  return `
  ${stepHtml}
  <div class="card">
    <div class="card-t">캠페인 요약</div>
    ${[
      ['서비스', BD.service==='zigbang'?'직방':'호갱노노'],
      ['채널',   BD.channel==='push'?'푸시 알림':BD.channel==='inapp'?'인앱 메시지':'카카오 알림톡'],
      ['오디언스', `${seg.name} (${seg.cnt}명)`],
      ['제목', BD.titleA||'(미입력)'],
      ['본문', BD.bodyA||'(미입력)'],
      ['딥링크', `${BD.deeplinkA||'(미설정)'}${dlEntry?` — ${dlEntry.desc}`:''}` ],
      ['트리거', BD.trigger==='immediate'?'즉시 발송':BD.trigger==='schedule'?'예약 발송':'이벤트 기반'],
    ].map(([k,v])=>`
    <div style="display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">
      <span style="color:var(--txt2);width:72px;flex-shrink:0">${k}</span>
      <span style="word-break:break-all">${v}</span>
    </div>`).join('')}
  </div>
  ${renderRetargetSummary()}
  <div style="display:flex;justify-content:space-between;margin-top:8px">
    <button class="btn btn-sm" onclick="builderStep=2;render()"><i class="ti ti-arrow-left" style="font-size:11px"></i> 이전</button>
    <button class="btn btn-p btn-sm" onclick="alert('🚀 캠페인이 등록되었습니다!\n크로스 디타겟: ' + (BD.retargetEnabled ? BD.retargetSteps.length + '단계 설정' : '미사용') + '\n(실제 발송 연동 필요)')"><i class="ti ti-send" style="font-size:11px"></i>캠페인 등록</button>
  </div>`;
}

function updatePreview() {
  const t = document.getElementById('prevTitle');
  const b = document.getElementById('prevBody');
  if(t) t.textContent = BD.titleA || '제목을 입력하세요';
  if(b) b.textContent = BD.bodyA  || '메시지 본문이 여기 표시됩니다';
}

// ── 크로스 채널 디타겟 헬퍼 ──────────────────────────────────────────────
function toggleRetarget() {
  BD.retargetEnabled = !BD.retargetEnabled;
  render();
}
function updateRtStep(idx, key, val) {
  BD.retargetSteps[idx][key] = val;
  // 딥링크 미입력 시 채널별 기본값 자동 설정
  if(key==='channel' && !BD.retargetSteps[idx].deeplink) {
    const defaults = {inapp:'zigbang:///home/apt/map', push:'zigbang:///home/apt/items/zzim', kakao:''};
    BD.retargetSteps[idx].deeplink = defaults[val]||'';
  }
}
function addRtStep() {
  if(BD.retargetSteps.length >= 3) return;
  const channels = ['push','inapp','kakao'];
  const usedCh = BD.retargetSteps.map(s=>s.channel);
  usedCh.push(BD.channel);
  const nextCh = channels.find(c=>!usedCh.includes(c)) || channels[0];
  BD.retargetSteps.push({condition:'no_open', delay:48, delayUnit:'h', channel:nextCh, title:'', body:'', deeplink:''});
  render();
}
function removeRtStep(idx) {
  BD.retargetSteps.splice(idx, 1);
  render();
}
function aiRtMsg(idx) {
  const step = BD.retargetSteps[idx];
  const seg = SEGS.find(s=>s.id===BD.segId)||SEGS[0];
  const key = getKey();
  if(!key) { alert('Claude API Key를 입력해주세요'); return; }
  const condLabel = COND_META[step.condition]?.label||step.condition;
  const prompt = `직방 앱 크로스채널 리타겟 메시지를 작성해주세요.
채널: ${CH_META[step.channel]?.label||step.channel}
조건: 1차 발송 ${condLabel} 유저 대상
세그먼트: ${seg.name}
딥링크: ${step.deeplink}
JSON 형식으로만: {"title":"...","body":"..."}`;
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:200,messages:[{role:'user',content:prompt}]})})
    .then(r=>r.json()).then(d=>{
      const txt = d.content[0].text.replace(/```json?|```/g,'').trim();
      const obj = JSON.parse(txt);
      BD.retargetSteps[idx].title = obj.title||'';
      BD.retargetSteps[idx].body  = obj.body||'';
      render();
    }).catch(e=>alert('생성 실패: '+e.message));
}

function renderRetargetConfig() {
  const firstCh = CH_META[BD.channel] || CH_META.push;
  const chOptions = (cur) => ['push','inapp','kakao']
    .filter(c => c !== BD.channel)
    .map(c => `<option value="${c}" ${cur===c?'selected':''}>${CH_META[c].label}</option>`).join('');

  return `
  <div class="divider" style="margin:14px 0 12px"></div>
  <div class="rt-toggle ${BD.retargetEnabled?'on':''}" onclick="toggleRetarget()">
    <div class="switch ${BD.retargetEnabled?'on':''}"></div>
    <div>
      <div style="font-size:12px;font-weight:600">크로스 채널 디타겟</div>
      <div class="tip">미오픈·미클릭·미전환 유저를 다른 채널로 자동 재발송</div>
    </div>
    ${BD.retargetEnabled?`<span class="badge badge-ok" style="margin-left:auto">${BD.retargetSteps.length}단계 설정됨</span>`:''}
  </div>
  ${BD.retargetEnabled ? `
  <div class="retarget-flow" style="margin-bottom:8px">
    <!-- 1차 발송 (현재 채널) -->
    <div style="display:flex;align-items:center;gap:8px;padding:9px 12px;background:var(--panel2);border-radius:var(--r2);border:1.5px solid var(--border2);margin-bottom:0">
      <div class="rt-ch-dot" style="background:${firstCh.color}22;border-color:${firstCh.color}">
        <i class="${firstCh.icon}" style="color:${firstCh.color}"></i>
      </div>
      <div>
        <div style="font-size:11px;font-weight:700">1차 발송</div>
        <div style="font-size:10px;color:var(--txt2)">${firstCh.label} · ${BD.titleA||'제목 미입력'}</div>
      </div>
      <span class="badge badge-info" style="margin-left:auto">발송 기준</span>
    </div>

    <!-- 각 디타겟 단계 -->
    ${BD.retargetSteps.map((step, idx) => {
      const cond = COND_META[step.condition]||COND_META.no_open;
      const ch   = CH_META[step.channel]  ||CH_META.push;
      const dlEntry = Object.values(DEEPLINK_MAP).find(d=>d.link===step.deeplink);
      return `
      <!-- 화살표 + 조건 -->
      <div style="display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:3px">
        <div style="width:1px;height:10px;background:var(--border2)"></div>
        <div class="rt-cond" style="color:${cond.color};background:${cond.bg};border:1px solid ${cond.border}">
          <i class="${cond.icon}" style="font-size:11px"></i>${cond.label}
          <select style="border:none;background:transparent;font-family:var(--font);font-size:10px;font-weight:600;color:${cond.color};cursor:pointer;padding:0 2px" onchange="updateRtStep(${idx},'condition',this.value);render()">
            ${Object.entries(COND_META).map(([k,v])=>`<option value="${k}" ${step.condition===k?'selected':''}>${v.label}</option>`).join('')}
          </select>
        </div>
        <div style="font-size:9px;color:var(--txt3)">
          <input type="number" min="1" max="72" value="${step.delay}" style="width:30px;border:none;background:transparent;font-family:var(--font);font-size:9px;color:var(--txt3);text-align:center" oninput="updateRtStep(${idx},'delay',+this.value)">
          <select style="border:none;background:transparent;font-family:var(--font);font-size:9px;color:var(--txt3);cursor:pointer" onchange="updateRtStep(${idx},'delayUnit',this.value)">
            <option value="h" ${step.delayUnit==='h'?'selected':''}>시간 후</option>
            <option value="d" ${step.delayUnit==='d'?'selected':''}>일 후</option>
          </select>
        </div>
        <div style="width:1px;height:10px;background:var(--border2)"></div>
      </div>

      <!-- 디타겟 채널 카드 -->
      <div class="rt-step-card">
        <span class="step-num">${idx+2}차 디타겟</span>
        <button class="rt-del-btn" onclick="removeRtStep(${idx})"><i class="ti ti-x" style="font-size:11px"></i></button>
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:10px;margin-top:4px">
          <div class="rt-ch-dot" style="width:32px;height:32px;background:${ch.color}22;border:1.5px solid ${ch.color}">
            <i class="${ch.icon}" style="color:${ch.color};font-size:14px"></i>
          </div>
          <select class="inp" style="flex:1;font-size:12px" onchange="updateRtStep(${idx},'channel',this.value);render()">
            ${chOptions(step.channel)}
          </select>
        </div>
        <div class="grid2" style="gap:7px;margin-bottom:7px">
          <div class="frow" style="margin:0"><label class="lbl">제목</label><input class="inp" style="font-size:11px" placeholder="재발송 제목" value="${step.title}" oninput="updateRtStep(${idx},'title',this.value)"></div>
          <div class="frow" style="margin:0"><label class="lbl">딥링크</label>
            <input class="inp" style="font-size:10px" placeholder="zigbang:///" value="${step.deeplink}" oninput="updateRtStep(${idx},'deeplink',this.value)">
            ${dlEntry?`<div class="tip" style="margin-top:2px">${dlEntry.desc}</div>`:''}
          </div>
        </div>
        <div class="frow" style="margin:0 0 7px">
          <label class="lbl">본문</label>
          <textarea class="inp" style="font-size:11px;min-height:44px" placeholder="재발송 메시지 본문..." oninput="updateRtStep(${idx},'body',this.value)">${step.body}</textarea>
        </div>
        <button class="btn btn-sm" style="width:100%;justify-content:center;font-size:11px" onclick="aiRtMsg(${idx})">
          <i class="ti ti-sparkles" style="font-size:10px;color:var(--ac)"></i>AI 메시지 추천
        </button>
      </div>`;
    }).join('')}

    ${BD.retargetSteps.length < 3 ? `
    <div style="padding:6px 0 2px;text-align:center">
      <button class="btn btn-sm" style="font-size:11px" onclick="addRtStep()">
        <i class="ti ti-plus" style="font-size:11px"></i>디타겟 단계 추가
      </button>
    </div>` : ''}
  </div>` : ''}`;
}

function renderRetargetSummary() {
  if(!BD.retargetEnabled || !BD.retargetSteps.length) return '';
  const firstCh = CH_META[BD.channel]||CH_META.push;
  return `
  <div class="card" style="border-color:var(--ac-border);background:var(--ac-bg);margin-top:10px">
    <div class="card-t" style="color:var(--ac);display:flex;align-items:center;gap:5px">
      <i class="ti ti-arrows-shuffle" style="font-size:13px"></i>크로스 채널 디타겟 (${BD.retargetSteps.length}단계)
    </div>
    <div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-top:6px">
      <span class="ch-pill" style="color:${firstCh.color};border-color:${firstCh.color}44;background:${firstCh.color}11">
        <i class="${firstCh.icon}" style="font-size:11px"></i>${firstCh.label}
      </span>
      ${BD.retargetSteps.map(step=>{
        const cond = COND_META[step.condition]||COND_META.no_open;
        const ch   = CH_META[step.channel]||CH_META.push;
        return `
        <span style="font-size:10px;color:var(--txt3)">→ ${cond.label} → ${step.delay}${step.delayUnit==='h'?'시간':'일'} 후</span>
        <span class="ch-pill" style="color:${ch.color};border-color:${ch.color}44;background:${ch.color}11">
          <i class="${ch.icon}" style="font-size:11px"></i>${ch.label}
        </span>`;
      }).join('')}
    </div>
    <div class="divider" style="margin:10px 0 8px"></div>
    ${BD.retargetSteps.map((step,idx)=>{
      const cond = COND_META[step.condition]||COND_META.no_open;
      const ch   = CH_META[step.channel]||CH_META.push;
      return `
      <div style="display:flex;gap:8px;padding:5px 0;border-bottom:1px solid var(--ac-border);font-size:11px;align-items:flex-start">
        <span style="color:var(--txt2);width:56px;flex-shrink:0">${idx+2}차</span>
        <div>
          <span class="rt-cond" style="color:${cond.color};background:${cond.bg};border:1px solid ${cond.border};font-size:9px;padding:1px 6px">${cond.label}</span>
          <span style="color:var(--txt2)"> → ${step.delay}${step.delayUnit==='h'?'시간':'일'} 후</span>
          <strong style="color:${ch.color}"> ${ch.label}</strong>
          ${step.title?`<div style="color:var(--txt);margin-top:2px">"${step.title}"</div>`:''}
          ${step.deeplink?`<code style="font-size:9px;color:var(--txt3)">${step.deeplink}</code>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function aiMsg(variant) {
  const seg = SEGS.find(s=>s.id===BD.segId)||SEGS[0];
  const key = getKey();
  if(!key) { alert('Claude API Key를 입력해주세요'); return; }
  const prompt = `직방 ${BD.service==='zigbang'?'직방':'호갱노노'} 앱 푸시 메시지를 작성해주세요.
대상: ${seg.name}
채널: ${BD.channel}
딥링크: ${BD.deeplinkA}

function initAgentUI() {}

function addAgentMsg(role, text, isErr=false) {
  const c = document.getElementById('amsgs');
  if(!c) return;
  const d = document.createElement('div');
  d.className = `amsg ${role}${isErr?' err':''}`;
  d.innerHTML = text.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/`([^`]+)`/g,'<code style="font-family:monospace;font-size:11px;background:rgba(0,0,0,.07);padding:1px 4px;border-radius:3px">$1</code>').replace(/\n/g,'<br>');
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function addAgentTool(name, navigate=false) {
  const c = document.getElementById('amsgs');
  if(!c) return null;
  const d = document.createElement('div');
  d.className = 'amsg tool';
  d.textContent = `⚙️ ${name}() 실행 중...${navigate?' → 빌더/저니로 이동':''}`;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
  return d;
}

function addAgentTy() {
  const c = document.getElementById('amsgs');
  if(!c) return;
  const d = document.createElement('div');
  d.className = 'amsg agent typing-wrap';
  d.id = 'agTyping';
  d.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function rmAgentTy() {
  const t = document.getElementById('agTyping');
  if(t) t.remove();
}

function sleep(ms) { return new Promise(r=>setTimeout(r,ms)); }
function getKey() {
  return document.getElementById('apiKeyInp')?.value.trim() ||
         sessionStorage.getItem('tms_apikey') || '';
}
function saveKey() {
  const v = document.getElementById('apiKeyInp')?.value.trim();
  if(v) { sessionStorage.setItem('tms_apikey', v); alert('API Key 저장됨 (세션)'); }
}

async function apiCall(msgs, attempt=0) {
  const key = getKey();
  if(!key) throw new Error('Claude API Key를 입력해주세요 (상단 오른쪽)');
  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body: JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1500,system:agentSys,tools:agentTools,messages:msgs})
    });
    if(!r.ok) {
      const e = await r.json().catch(()=>({error:{message:r.statusText}}));
      throw new Error(e.error?.message || r.statusText);
    }
    return await r.json();
  } catch(e) {
    if((e.message.includes('fetch')||e.message.includes('Failed'))&&attempt<2){ await sleep(800*Math.pow(2,attempt)); return apiCall(msgs,attempt+1); }
    throw e;
  }
}

async function runAgent() {
  while(true) {
    const data = await apiCall(agentHist); rmAgentTy();
    const tbs = data.content.filter(b=>b.type==='tool_use');
    const txs = data.content.filter(b=>b.type==='text');
    if(tbs.length) {
      const isNav = tbs[0].name==='create_campaign'||tbs[0].name==='select_journey';
      const td = addAgentTool(tbs[0].name, isNav);
      const results = tbs.map(tb=>({type:'tool_result',tool_use_id:tb.id,content:JSON.stringify(execTool(tb.name,tb.input))}));
      agentHist.push({role:'assistant',content:data.content});
      agentHist.push({role:'user',content:results});
      if(td) td.remove();
      // 도구 결과 요약 메시지
      const toolRes = results[0]?.content;
      if(toolRes) {
        const parsed = JSON.parse(toolRes);
        if(parsed.summary) addAgentMsg('agent', parsed.summary);
      }
      continue;
    }
    agentHist.push({role:'assistant',content:data.content});
    if(txs.length) addAgentMsg('agent', txs.map(b=>b.text).join('\n'));
    break;
  }
}

async function agentSend(txt) {
  const el = document.getElementById('ainp');
  const m = txt || el?.value.trim();
  if(!m||agentBusy) return;
  if(!txt&&el) { el.value=''; el.style.height='auto'; }
  agentBusy = true;
  const sb = document.getElementById('asbtn'); if(sb) sb.disabled=true;
  addAgentMsg('user', m);
  agentHist.push({role:'user',content:m});
  addAgentTy();
  try { await runAgent(); }
  catch(e) { rmAgentTy(); addAgentMsg('agent', `⚠️ 오류: ${e.message}`, true); }
  agentBusy = false; if(sb) sb.disabled=false;
}

function agentSug(t) {
  if(activeSection!=='agent') nav('agent', document.getElementById('sbn-agent'));
  setTimeout(()=>agentSend(t), 100);
}
function sendPrompt(t) { agentSug(t); }
function onAKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();agentSend();} }
function rsz(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,68)+'px'; }

  const html = document.documentElement;

  html.setAttribute('data-theme', isDark?'light':'dark');
  document.getElementById('themeIco').className = isDark?'ti ti-moon':'ti ti-sun';
}
